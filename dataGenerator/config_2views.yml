# Parameters to setup CT simulation.

# dataset
numTrain: 2
numVal: 2

# System configuration
DSD: 900.0  # Distance Source Detector      (mm)
DSO: 772.0  # Distance Source Origin        (mm)

# Detector parameters
dDetector: # Size of each pixel            (mm)
- 1.0
- 1.0

# Image parameters
dVoxel: # size of each voxel            (mm)
- 1.0
- 1.0
- 1.0

# Offsets
offOrigin: # Offset of image from origin   (mm)
- 0 # x direction
- 0 # y direction
- 0 # z direction
offDetector: # Offset of Detector (only in two direction)            (mm)
- 0 # u direction
- 0 # v direction

# Auxiliary
accuracy: 0.5 # Accuracy of FWD proj          (vx/sample)

# Mode
mode: cone # X-ray source mode parallel/cone
filter: null

# Angles
totalAngle: 180.0 # Total angle  (degree)
startAngle: 0.0 # Start angle (degree)
randomAngle: False

# CT
convert: False
rescale_slope: 1.0
rescale_intercept: -1000.0
normalize: True
percentile: False
min: 0.0
max: 2500.0
# Noise
noise: False
